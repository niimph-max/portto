document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

{lots:[...this.state.lots,lot], prices, sheet:null, error:''});\n    } else {\n      const avail=this.availableFor(sym);\n      if(shares>avail+1e-9){ return this.setState({error:'ขายเกินจำนวนที่ถือ ('+(isFund?this.unitsStr(avail)+' หน่วย':avail+' หุ้น')+')'}); }\n      let remain=shares, costNative=0, costTHB=0;\n      const lots=this.state.lots.map(l=>({...l}));\n      const open=lots.filter(l=>l.symbol===sym && l.remaining>0).sort((a,b)=>a.date.localeCompare(b.date));\n      for(const l of open){ if(remain<=1e-9)break; const take=Math.min(l.remaining,remain); costNative+=take*l.price; costTHB+=take*l.price*this.fxOf(l) + (l.shares? take/l.shares*(l.fee||0):0); l.remaining-=take; remain-=take; }\n      const buyAvg=costNative/shares;\n      const enteredSellFee=parseFloat(f.fee);\n      const sellFee=(f.assetType==='stock')? ((f.fee!==''&&f.fee!=null&&!isNaN(enteredSellFee))? enteredSellFee : this.feeOf(shares*price*fx)) : 0;\n      const proceedsTHB=shares*price*fx - sellFee;\n      const pl=proceedsTHB-costTHB;\n      const sell={id:'s'+Date.now(),symbol:sym,assetType:f.assetType,ccy,fx,brokerId:f.brokerId,amcId:f.amcId,taxType:f.taxType,portfolioId:f.portfolioId,shares,price,buyAvg,fee:sellFee,pl,date:this.today(),reason:f.reason.trim(),tag:f.tag,confidence:f.confidence,emotion:f.emotion};\n      const cleanLots=lots.filter(l=>l.remaining>1e-9 || l.symbol!==sym);\n      const stillHeld=cleanLots.some(l=>l.symbol===sym);\n      this.persist({lots:cleanLots, sells:[...this.state.sells,sell], sheet:null, error:'', screen: (this.state.screen==='detail' && !stillHeld)?'dashboard':this.state.screen});\n    }\n  }\n\n  feeOf(thbValue){ return thbValue*(this.state.feeRate||0)/100*1.07; }\n  setFeeRate(v){ const n=parseFloat(v); this.persist({feeRate: isNaN(n)?0:Math.max(0,n)}); }\n  addWatch(){ const s=(this.state.newWatchSym||'').trim().toUpperCase(); if(!s) return; const t=parseFloat(this.state.newWatchTarget); const item={id:'w'+Date.now(), symbol:s, target:isNaN(t) sNaN(n)||v===''){ delete t[sym]; } else { t[sym]=Math.max(0,Math.min(100,n)); } this.persist({stockTargets:t}); }\n  resetData(){ const s=this.seed(); this.persist({...s, screen:'dashboard', filter:'all', assetFilter:'all', detailSymbol:null}); }\n\n  // ---- data safety (backup / sample) ----\n  keepSample(){ this.persist({sample:false}); }\n  deleteAccount(){ if(typeof window!=='undefined' && window.confirm && !window.confirm('ลบบัญชีและข้อมูลทั้งหมดถาวร? การกระทำนี้ย้อนกลับไม่ได้')) return; try{ localStorage.removeItem('thaiTradeAuth'); localStorage.removeItem('thaiTradeJournal_v4'); }catch(e){} const s=this.seed(); this.setState({...s, account:null, screen:'dashboard', filter:'all', assetFilter:'all', detailSymbol:null}); }\n  clearToEmpty(){ this.persist({lots:[], sells:[], divs:[], targets:{}, stockTargets:{}, prices:{}, cash:0, sample:false, screen:'dashboard', filter:'all', assetFilter:'all', detailSymbol:null}); }\n  exportData(){ try{ this.save(); const raw=localStorage.getItem('thaiTradeJournal_v4')||'{}'; const blob=new Blob([raw],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='tradejournal-backup-'+new Date().toISOString().slice(0,10)+'.json'; document.body.appendChild(a); a.click(); setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },200); }catch(e){} }\n  importData(){ try{ const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json,.json'; inp.onchange=(e)=>{ const f=e.target.files&&e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{ try{ const d=JSON.parse(r.result); const seed=this.seed(); const mg={...seed, ...d}; this.persist({ brokers:mg.brokers, amcs:mg.amcs, portfolios:mg.portfolios, prices:mg.prices||{}, targets:mg.targets||{}, lots:mg.lots||[], sells:mg.sells||[], divs:mg.divs||[], fxRate:mg.fxRate, cash:mg.cash, targetAlloc:mg.targetAlloc, stockTargets:mg.stockTargets||{}, isPremium:!!mg.is ject.values(map).map(o=>{\n      const fxNow=this.fxNow(o.ccy);\n      const price=prices[o.symbol]!==undefined?prices[o.symbol]:(o.costNative/o.shares);\n      const avg=o.costNative/o.shares;\n      const valueNative=o.shares*price;\n      const value=valueNative*fxNow;\n      const cost=o.costTHB;\n      const unreal=value-cost;\n      const pct=cost? unreal/cost*100 : 0;\n      const topPort=Object.keys(o.ports).sort((a,b)=>o.ports[b]-o.ports[a])[0];\n      return {...o, price, avg, valueNative, value, cost, unreal, pct, topPort, isFund:o.assetType==='fund'};\n    }).sort((a,b)=>b.unreal-a.unreal);\n  }\n\n  renderVals(){\n    const st=this.state;\n    const v={};\n    const screen=st.screen;\n    v.isDashboard=screen==='dashboard';\n    v.isDetail=screen==='detail';\n    v.isHistory=screen==='history';\n    v.isStats=screen==='stats';\n    v.isSettings=screen==='settings';\n\n    // nav\n    v.goDash=()=>this.nav('dashboard');\n    v.goHistory=()=>this.nav('history');\n    v.goStats=()=>this.nav('stats');\n    v.goSettings=()=>this.nav('settings');\n    v.openBuy=()=>this.openSheet('buy');\n    v.back=()=>this.back();\n    const act='#1c2533', inact='#b0b5c0';\n    v.colDash=v.isDashboard?act:inact; v.colHist=v.isHistory?act:inact; v.colStats=v.isStats?act:inact; v.colSet=v.isSettings?act:inact;\n    v.icoDash=v.isDashboard?'📊':'📈'; v.icoHist='🧾'; v.icoStats='📐'; v.icoSet='⚙️';\n\n    // greeting\n    v.clock=this.clockStr();\n    const h=new Date().getHours();\n    v.greeting= h<12?'สวัสดีตอนเช้า 👋':(h<17?'สวัสดีตอนบ่าย ☀️':'สวัสดีตอนเย็น 🌆');\n\n    // ---- dashboard ----\n    const positions=this.computePositions(st.filter, st.assetFilter);\n    v.posCount=positions.length;\n    v.hasPositions=positions.length>0;\n    v.noPositions=positions.length===0;\n    const totalValue=positions.reduce((a,p)=>a+p.value,0);\n    const totalCost=positions.reduce((a,p)=>a+p.cost,0);\n    const totalUnreal=positions.reduce((a,p)=>a+p.unreal,0);\n    v.fxStr=this.m(st.fxRat
